version: "3.9"
services:
  vaadin:
    image: vaadin/my-app:${MY_APP_VERSION:-latest}
    build: ../../../my-app
    ports:
      - "8080:8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /app
      VAADIN_URL_MAPPING: /ui/*
  web:
    image: nginx
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template
    ports:
      - "9090:80"
