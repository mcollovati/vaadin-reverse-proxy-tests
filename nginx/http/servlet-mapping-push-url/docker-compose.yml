version: "3.9"
services:
  vaadin:
    image: vaadin/my-app:${MY_APP_VERSION:-latest}
    build: ../../../my-app
    ports:
      - "8080:8080"
    environment:
      - VAADIN_URL_MAPPING=/ui/*
      - VAADIN_PUSH_URL=/VAADIN/push
  web:
    image: nginx
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template
    ports:
      - "9090:80"
